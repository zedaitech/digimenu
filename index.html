<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mast Malvani — Digital Menu</title>
  <meta name="description" content="Authentic Malvani Cuisine Since 1998 — Browse our menu, build your order, and checkout via WhatsApp.">
  <meta name="author" content="Zed Labs">
  <meta name="theme-color" content="#0a0a0b">

  <!-- Open Graph -->
  <meta property="og:title" content="Mast Malvani — Digital Menu">
  <meta property="og:description" content="Authentic Malvani Cuisine Since 1998 — Browse our menu and order via WhatsApp.">
  <meta property="og:type" content="restaurant.restaurant">
  <meta property="og:image" content="assets/images/og-image.png">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/images/logo.svg">
  <link rel="apple-touch-icon" href="assets/images/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Fonts: only critical weights -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/focus@3.x.x/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #09090b;
      --surface: #111113;
      --surface2: #18181b;
      --surface3: #222225;
      --border: rgba(255,255,255,0.06);
      --border-light: rgba(255,255,255,0.12);
      --gold: #d4af37;
      --gold-light: #f0d060;
      --gold-dim: rgba(212,175,55,0.12);
      --text: #f0ede8;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --green: #22c55e;
      --green-dim: rgba(34,197,94,0.12);
      --red: #ef4444;
      --red-dim: rgba(239,68,68,0.1);
      --whatsapp: #25D366;
      --radius: 16px;
      --radius-sm: 12px;
      --radius-xs: 8px;
      --radius-full: 9999px;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Inter', system-ui, -apple-system, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-width: 320px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      line-height: 1.6;
    }

    [x-cloak] { display: none !important; }

    /* Ambient glow */
    body::before {
      content: '';
      position: fixed; top: -50%; left: -30%; width: 100%; height: 100%;
      background: radial-gradient(ellipse, rgba(212,175,55,0.03) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

    /* Focus */
    :focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

    /* Hide scrollbar */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Tap feedback */
    .tap { transition: transform 0.1s ease; }
    .tap:active { transform: scale(0.97); }

    /* ========================================
       LOADING SKELETON
       ======================================== */
    .skeleton-screen { max-width: 480px; margin: 0 auto; padding: 2rem 1rem; }
    .sk {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius-xs);
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .sk-circle { border-radius: 50%; }
    .sk-card {
      display: flex; background: var(--surface); border-radius: var(--radius);
      overflow: hidden; border: 1px solid var(--border); margin-bottom: 12px;
    }
    .sk-card-img { width: 140px; min-height: 140px; flex-shrink: 0; }
    .sk-card-body { flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 8px; }

    /* ========================================
       HERO
       ======================================== */
    .hero {
      position: relative; padding: 32px 16px 20px; text-align: center;
    }
    .hero-content { position: relative; z-index: 2; }

    /* Animated logo ring */
    .logo-wrap {
      width: 100px; height: 100px; margin: 0 auto 16px;
      position: relative; display: flex; align-items: center; justify-content: center;
    }
    .logo-ring {
      position: absolute; inset: -4px; border-radius: 50%;
      border: 2px solid transparent;
      background: conic-gradient(from 0deg, var(--gold), var(--gold-light), var(--gold), transparent) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude;
      animation: logoSpin 4s linear infinite;
    }
    @keyframes logoSpin { to { transform: rotate(360deg); } }
    .hero-logo {
      width: 92px; height: 92px; border-radius: 50%; object-fit: cover;
      background: var(--surface); border: 2px solid var(--surface3);
    }
    .hero-logo-fallback {
      width: 92px; height: 92px; border-radius: 50%; background: var(--surface);
      border: 2px solid var(--surface3);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-size: 2rem; font-weight: 700; color: var(--gold);
    }

    .hero h1 {
      font-family: var(--font-display); font-size: 2rem; font-weight: 700;
      color: var(--gold); letter-spacing: 0.01em; line-height: 1.2;
    }
    .hero-divider {
      width: 48px; height: 1.5px; margin: 10px auto;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .hero .tagline {
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2.5px;
      color: var(--text-muted); font-weight: 500;
    }

    /* Status + Rating bar */
    .hero-meta {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; margin-top: 12px; font-size: 0.75rem; color: var(--text-secondary);
    }
    .status-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: var(--radius-full);
      background: var(--green-dim); color: var(--green);
      font-weight: 600; font-size: 0.7rem;
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--green);
      animation: pulse 2s ease infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .rating-badge {
      display: inline-flex; align-items: center; gap: 3px;
      font-weight: 600; color: var(--gold);
    }
    .hero-meta .sep { color: var(--text-muted); }

    /* Hero action buttons */
    .hero-actions { display: flex; justify-content: center; gap: 8px; margin-top: 16px; }
    .hero-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: var(--radius-full);
      font-size: 0.78rem; font-weight: 500; text-decoration: none;
      transition: all 0.2s ease; min-height: 44px;
      border: none; cursor: pointer; font-family: var(--font-body);
    }
    .hero-btn--call {
      background: var(--gold-dim); color: var(--gold); border: 1px solid rgba(212,175,55,0.15);
    }
    .hero-btn--call:hover { background: rgba(212,175,55,0.2); }
    .hero-btn--map {
      background: rgba(255,255,255,0.04); color: var(--text-secondary); border: 1px solid var(--border);
    }
    .hero-btn--map:hover { background: rgba(255,255,255,0.07); color: var(--text); }

    /* ========================================
       STICKY NAV
       ======================================== */
    .sticky-nav {
      position: sticky; top: 0; z-index: 30;
      background: rgba(9,9,11,0.88);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px 8px;
    }
    .nav-inner { max-width: 480px; margin: 0 auto; }

    /* Search */
    .search-wrap { position: relative; margin-bottom: 8px; }
    .search-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); pointer-events: none;
    }
    .search-input {
      width: 100%; padding: 10px 40px 10px 38px;
      border-radius: var(--radius-full); border: 1px solid var(--border);
      background: var(--surface2); color: var(--text);
      font-size: 0.82rem; font-family: var(--font-body); outline: none;
      transition: border-color 0.2s, box-shadow 0.2s; min-height: 44px;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { border-color: rgba(212,175,55,0.4); box-shadow: 0 0 0 3px rgba(212,175,55,0.08); }
    .search-clear {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      width: 30px; height: 30px; border-radius: 50%; background: var(--surface3);
      border: none; color: var(--text-muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      min-width: 44px; min-height: 44px; padding: 7px;
    }
    .search-clear:hover { background: var(--border-light); color: var(--text); }

    /* Filters */
    .filters { display: flex; gap: 6px; margin-bottom: 8px; }
    .filter-btn {
      padding: 6px 14px; border-radius: var(--radius-full);
      font-size: 0.76rem; font-weight: 500; border: 1px solid var(--border);
      background: transparent; color: var(--text-muted); cursor: pointer;
      transition: all 0.2s ease; min-height: 44px;
      display: flex; align-items: center; gap: 5px; font-family: var(--font-body);
    }
    .filter-btn:hover { border-color: var(--border-light); color: var(--text-secondary); }
    .filter-btn.active--all { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: #111; border-color: transparent; font-weight: 600; }
    .filter-btn.active--veg { background: var(--green); color: #fff; border-color: transparent; font-weight: 600; }
    .filter-btn.active--nonveg { background: var(--red); color: #fff; border-color: transparent; font-weight: 600; }

    /* Veg/NonVeg indicators */
    .vdot, .nvdot {
      width: 14px; height: 14px; border: 2px solid; border-radius: 3px;
      display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .vdot { border-color: var(--green); }
    .nvdot { border-color: var(--red); }
    .vdot::after, .nvdot::after { content: ''; width: 7px; height: 7px; border-radius: 50%; }
    .vdot::after { background: var(--green); }
    .nvdot::after { background: var(--red); }
    .vdot--sm, .nvdot--sm { width: 11px; height: 11px; }
    .vdot--sm::after, .nvdot--sm::after { width: 5px; height: 5px; }

    /* Category tabs */
    .cat-nav { display: flex; gap: 4px; overflow-x: auto; }
    .cat-tab {
      padding: 7px 12px; border-radius: var(--radius-full);
      font-size: 0.72rem; font-weight: 500; white-space: nowrap;
      border: 1px solid transparent; background: transparent;
      color: var(--text-muted); cursor: pointer;
      transition: all 0.2s ease; min-height: 44px;
      font-family: var(--font-body); display: flex; align-items: center; gap: 4px;
    }
    .cat-tab:hover { color: var(--text-secondary); }
    .cat-tab.active { background: var(--gold-dim); color: var(--gold); border-color: rgba(212,175,55,0.12); font-weight: 600; }
    .cat-tab-count {
      font-size: 0.6rem; opacity: 0.5; background: rgba(255,255,255,0.05);
      padding: 1px 5px; border-radius: var(--radius-full);
    }

    /* ========================================
       MENU CONTENT
       ======================================== */
    .main {
      max-width: 480px; margin: 0 auto;
      padding: 4px 16px 120px; position: relative; z-index: 1;
    }

    .category-section { margin-bottom: 24px; content-visibility: auto; }
    .category-title {
      font-family: var(--font-display); font-size: 1.25rem; font-weight: 700;
      color: var(--text); margin: 20px 0 12px; display: flex; align-items: center; gap: 10px;
    }
    .category-title::before {
      content: ''; width: 3px; height: 20px;
      background: linear-gradient(180deg, var(--gold), transparent);
      border-radius: 2px; flex-shrink: 0;
    }
    .cat-count {
      font-family: var(--font-body); font-size: 0.68rem;
      font-weight: 400; color: var(--text-muted);
    }

    /* ========================================
       MENU CARD — The hero of the UI
       ======================================== */
    .menu-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      transition: transform 0.3s cubic-bezier(0.22,1,0.36,1), box-shadow 0.3s ease, border-color 0.3s ease;
    }
    .menu-card:hover {
      transform: translateY(-2px); border-color: var(--border-light);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .menu-card-inner { display: flex; }

    /* Card image — LARGER */
    .card-img-wrap {
      width: 140px; flex-shrink: 0; position: relative; overflow: hidden;
      background: var(--surface2); aspect-ratio: 1;
    }
    .card-img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.5s cubic-bezier(0.22,1,0.36,1);
    }
    .menu-card:hover .card-img { transform: scale(1.06); }

    /* Image shimmer skeleton */
    .img-skeleton {
      position: absolute; inset: 0; z-index: 1;
      background: linear-gradient(90deg, var(--surface2) 25%, var(--surface3) 50%, var(--surface2) 75%);
      background-size: 200% 100%; animation: shimmer 1.5s infinite;
    }

    /* Placeholder */
    .card-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, var(--surface2) 0%, var(--surface3) 100%);
      position: relative; overflow: hidden;
    }
    .card-placeholder::before {
      content: ''; position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Cpath d='M20 20c0-5.523 4.477-10 10-10s10 4.477 10 10-4.477 10-10 10-10-4.477-10-10zM0 20c0-5.523 4.477-10 10-10s10 4.477 10 10-4.477 10-10 10S0 25.523 0 20z'/%3E%3C/g%3E%3C/svg%3E");
      opacity: 0.5;
    }
    .card-placeholder-icon {
      font-size: 2.5rem; position: relative; z-index: 1;
      filter: grayscale(0.3);
    }

    /* Bestseller badge */
    .bestseller {
      position: absolute; top: 8px; left: 0; z-index: 2;
      padding: 2px 8px 2px 6px; border-radius: 0 4px 4px 0;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: #111; font-size: 0.58rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px;
      display: flex; align-items: center; gap: 3px;
      box-shadow: 0 2px 6px rgba(212,175,55,0.3);
    }

    /* Card body */
    .card-body {
      flex: 1; padding: 12px 14px; display: flex; flex-direction: column; min-width: 0;
    }
    .card-header { display: flex; align-items: flex-start; gap: 6px; }
    .card-name {
      font-family: var(--font-display); font-size: 0.95rem;
      font-weight: 700; color: var(--text); line-height: 1.3;
    }
    .card-desc {
      font-size: 0.73rem; color: var(--text-muted); margin-top: 4px;
      line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: auto; padding-top: 8px;
    }
    .card-price {
      font-size: 1.05rem; font-weight: 700; color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .card-price .rupee { color: var(--gold); font-weight: 600; }

    /* Add button */
    .add-btn {
      padding: 6px 18px; border-radius: var(--radius-xs);
      font-size: 0.78rem; font-weight: 600; font-family: var(--font-body);
      text-transform: uppercase; letter-spacing: 0.3px;
      border: 1.5px solid var(--border-light); background: transparent;
      color: var(--text); cursor: pointer;
      transition: all 0.2s ease; min-height: 44px; min-width: 44px;
    }
    .add-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
    .add-btn--adding { background: var(--gold); color: #111; border-color: var(--gold); pointer-events: none; animation: addPulse 0.4s ease; }
    .add-btn--added { background: var(--green); color: #fff; border-color: var(--green); pointer-events: none; }
    @keyframes addPulse { 0% { transform: scale(1); } 50% { transform: scale(1.06); } 100% { transform: scale(1); } }

    /* Qty controls */
    .qty-ctrl {
      display: flex; align-items: center;
      border-radius: var(--radius-xs); border: 1.5px solid var(--gold); overflow: hidden;
      background: var(--gold-dim);
    }
    .qty-btn {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      background: transparent; color: var(--gold);
      font-size: 1.1rem; font-weight: 700; border: none; cursor: pointer;
      transition: background 0.15s;
      min-height: 44px; min-width: 44px; font-family: var(--font-body);
    }
    .qty-btn:hover { background: rgba(212,175,55,0.15); }
    .qty-val {
      width: 24px; text-align: center; font-size: 0.85rem;
      font-weight: 700; color: var(--gold); font-variant-numeric: tabular-nums;
    }

    /* Scroll reveal animation — only when JS observer is active */
    .reveal-ready .reveal {
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.22,1,0.36,1);
    }
    .reveal-ready .reveal.visible { opacity: 1; transform: translateY(0); }

    /* Empty state */
    .empty-state { text-align: center; padding: 48px 16px; color: var(--text-muted); }
    .empty-state p { font-size: 0.88rem; }
    .empty-state p + p { font-size: 0.75rem; margin-top: 4px; color: var(--text-muted); }

    /* Search count */
    .search-info { text-align: center; padding: 8px; font-size: 0.73rem; color: var(--text-muted); }

    /* ========================================
       TOAST NOTIFICATION
       ======================================== */
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      z-index: 60; padding: 10px 20px;
      background: var(--surface3); border: 1px solid var(--border-light);
      border-radius: var(--radius-full); color: var(--text);
      font-size: 0.8rem; font-weight: 500;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      display: flex; align-items: center; gap: 6px;
      white-space: nowrap; pointer-events: none;
    }
    .toast-enter { animation: toastIn 0.3s cubic-bezier(0.22,1,0.36,1); }
    .toast-leave { animation: toastOut 0.25s ease forwards; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(16px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateX(-50%) translateY(8px); } }

    /* ========================================
       FLOATING CART
       ======================================== */
    .cart-strip {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
      padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom));
    }
    .cart-strip-inner {
      max-width: 480px; margin: 0 auto;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      border-radius: var(--radius); padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; box-shadow: 0 -4px 24px rgba(0,0,0,0.3), 0 4px 20px rgba(212,175,55,0.2);
      transition: transform 0.2s ease;
      color: #111;
    }
    .cart-strip-inner:hover { transform: translateY(-2px); }
    .cart-strip-inner:active { transform: scale(0.98); }
    .cart-strip-left { display: flex; align-items: center; gap: 10px; }
    .cart-strip-count {
      width: 28px; height: 28px; border-radius: var(--radius-xs);
      background: rgba(0,0,0,0.15); display: flex; align-items: center;
      justify-content: center; font-size: 0.82rem; font-weight: 700;
    }
    .cart-strip-label { font-size: 0.85rem; font-weight: 600; }
    .cart-strip-label small { font-weight: 400; font-size: 0.72rem; opacity: 0.7; display: block; }
    .cart-strip-total { font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: 4px; }
    .cart-strip-arrow { font-size: 1.2rem; margin-left: 4px; }

    /* ========================================
       CART DRAWER
       ======================================== */
    .cart-overlay { position: fixed; inset: 0; z-index: 50; }
    .cart-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
    .cart-panel {
      position: absolute; bottom: 0; left: 0; right: 0;
      max-height: 92vh; background: var(--surface);
      border-top: 1px solid var(--border-light);
      border-radius: 20px 20px 0 0;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .slide-enter { animation: slideUp 0.35s cubic-bezier(0.22,1,0.36,1); }
    .slide-leave { animation: slideDown 0.25s ease-in forwards; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes slideDown { from { transform: translateY(0); } to { transform: translateY(100%); } }

    .drawer-handle { width: 40px; height: 4px; border-radius: 2px; background: var(--surface3); margin: 8px auto 0; }

    .cart-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .cart-header h2 { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; }
    .cart-header-sub { font-family: var(--font-body); font-size: 0.72rem; color: var(--text-muted); font-weight: 400; }
    .cart-header-actions { display: flex; gap: 6px; align-items: center; }
    .cart-clear {
      font-size: 0.73rem; color: var(--red); background: none; border: none;
      cursor: pointer; font-weight: 500; padding: 8px;
      min-height: 44px; display: flex; align-items: center; font-family: var(--font-body);
    }
    .cart-clear:hover { color: #ff6b6b; }
    .cart-close {
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      border-radius: 50%; background: var(--surface2); border: none;
      color: var(--text-muted); cursor: pointer; transition: background 0.15s;
      min-height: 44px; min-width: 44px;
    }
    .cart-close:hover { background: var(--surface3); color: var(--text); }

    .cart-body { flex: 1; overflow-y: auto; padding: 8px 16px; }

    /* Cart item with thumbnail */
    .cart-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .cart-item:last-child { border-bottom: none; }
    .cart-item-thumb {
      width: 44px; height: 44px; border-radius: var(--radius-xs);
      object-fit: cover; flex-shrink: 0; background: var(--surface2);
    }
    .cart-item-thumb-placeholder {
      width: 44px; height: 44px; border-radius: var(--radius-xs);
      background: var(--surface2); display: flex; align-items: center;
      justify-content: center; font-size: 1.2rem; flex-shrink: 0;
    }
    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-name { font-size: 0.82rem; font-weight: 500; display: flex; align-items: center; gap: 5px; }
    .cart-item-each { font-size: 0.68rem; color: var(--text-muted); margin-top: 1px; }
    .cart-item-total { font-size: 0.88rem; font-weight: 700; color: var(--text); min-width: 50px; text-align: right; font-variant-numeric: tabular-nums; }

    .cart-qty {
      display: flex; align-items: center; border-radius: 6px;
      background: var(--surface2); border: 1px solid var(--border);
    }
    .cart-qty button {
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      background: none; border: none; color: var(--text-secondary);
      font-size: 1rem; font-weight: 600; cursor: pointer;
      min-height: 44px; min-width: 44px; font-family: var(--font-body);
    }
    .cart-qty button:hover { color: var(--gold); }
    .cart-qty span { width: 20px; text-align: center; font-size: 0.78rem; font-weight: 700; }

    /* Cart total */
    .cart-total-section {
      padding: 12px 0 0; margin-top: 8px; border-top: 1px solid var(--border-light);
    }
    .cart-total-row { display: flex; justify-content: space-between; align-items: center; }
    .cart-total-label { font-size: 0.9rem; font-weight: 600; }
    .cart-total-amount {
      font-family: var(--font-display); font-size: 1.35rem; font-weight: 700; color: var(--gold);
    }

    /* Order section */
    .order-section { margin-top: 20px; }
    .order-section h3 {
      font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text-muted); margin-bottom: 10px;
    }
    .order-types { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .order-type-btn {
      padding: 10px; border-radius: var(--radius-xs);
      border: 1.5px solid var(--border); background: transparent;
      color: var(--text-muted); cursor: pointer; transition: all 0.2s ease;
      font-family: var(--font-body); font-size: 0.8rem; font-weight: 500;
      min-height: 44px; display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .order-type-btn:hover { border-color: var(--border-light); }
    .order-type-btn.active { border-color: var(--gold); background: var(--gold-dim); color: var(--gold); }

    /* Form */
    .form-group { margin-bottom: 10px; }
    .form-label { display: block; font-size: 0.72rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 4px; }
    .form-label .req { color: var(--red); }
    .form-input {
      width: 100%; padding: 10px 12px; border-radius: var(--radius-xs);
      border: 1.5px solid var(--border); background: var(--surface2);
      color: var(--text); font-size: 0.85rem; font-family: var(--font-body);
      transition: border-color 0.2s, box-shadow 0.2s; min-height: 44px; outline: none;
    }
    .form-input::placeholder { color: var(--text-muted); }
    .form-input:focus { border-color: rgba(212,175,55,0.4); box-shadow: 0 0 0 3px rgba(212,175,55,0.08); }
    textarea.form-input { resize: none; min-height: 60px; }

    .form-error {
      color: var(--red); font-size: 0.74rem; margin-top: 8px;
      display: flex; align-items: center; gap: 4px;
    }

    /* Cart footer */
    .cart-footer {
      padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom));
      border-top: 1px solid var(--border); flex-shrink: 0; background: var(--surface);
    }
    .wa-btn {
      width: 100%; padding: 14px; border-radius: var(--radius-sm);
      background: var(--whatsapp); color: #fff;
      font-size: 0.92rem; font-weight: 600; font-family: var(--font-body);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all 0.2s ease; min-height: 52px;
    }
    .wa-btn:hover { background: #1ebe57; box-shadow: 0 6px 20px rgba(37,211,102,0.25); }
    .wa-btn:active { transform: scale(0.98); }
    .add-more-btn {
      width: 100%; padding: 10px; margin-top: 6px;
      border-radius: var(--radius-sm); background: transparent;
      color: var(--text-muted); font-size: 0.8rem; font-weight: 500;
      font-family: var(--font-body); border: 1px solid var(--border);
      cursor: pointer; min-height: 44px;
    }
    .add-more-btn:hover { background: var(--surface2); color: var(--text-secondary); }

    /* Scroll to top */
    .scroll-top {
      position: fixed; bottom: 80px; left: 16px; z-index: 39;
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text-muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      min-height: 44px; min-width: 44px;
    }
    .scroll-top:hover { background: var(--surface3); color: var(--text); }

    /* Maps button */
    .maps-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 12px 16px; border-radius: var(--radius);
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-secondary); font-size: 0.82rem; font-weight: 500;
      text-decoration: none; min-height: 44px; margin-top: 24px; font-family: var(--font-body);
      transition: all 0.2s;
    }
    .maps-btn:hover { border-color: var(--border-light); background: var(--surface2); color: var(--text); }

    /* Footer */
    .site-footer {
      text-align: center; padding: 20px 16px;
      font-size: 0.68rem; color: var(--text-muted);
      border-top: 1px solid var(--border);
      max-width: 480px; margin: 0 auto;
    }
    .site-footer span { color: var(--gold); font-weight: 500; }

    /* Responsive */
    @media (min-width: 480px) {
      .hero h1 { font-size: 2.5rem; }
      .card-img-wrap { width: 160px; }
    }
  </style>
</head>
<body x-data="menuApp()" x-init="init()">

  <!-- Loading Skeleton -->
  <div x-show="loading" class="skeleton-screen" role="status" aria-label="Loading menu">
    <div style="text-align:center;padding:12px 0 20px">
      <div class="sk sk-circle" style="width:80px;height:80px;margin:0 auto 12px"></div>
      <div class="sk" style="width:160px;height:20px;margin:0 auto 8px"></div>
      <div class="sk" style="width:220px;height:10px;margin:0 auto"></div>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:12px">
      <div class="sk" style="width:50px;height:32px;border-radius:99px"></div>
      <div class="sk" style="width:60px;height:32px;border-radius:99px"></div>
      <div class="sk" style="width:70px;height:32px;border-radius:99px"></div>
    </div>
    <template x-for="i in 4" :key="i">
      <div class="sk-card">
        <div class="sk sk-card-img"></div>
        <div class="sk-card-body">
          <div class="sk" style="width:65%;height:12px"></div>
          <div class="sk" style="width:90%;height:9px"></div>
          <div style="display:flex;justify-content:space-between;margin-top:auto">
            <div class="sk" style="width:45px;height:14px"></div>
            <div class="sk" style="width:55px;height:30px;border-radius:8px"></div>
          </div>
        </div>
      </div>
    </template>
  </div>

  <!-- App -->
  <div x-show="!loading" x-cloak>

    <!-- Hero -->
    <section class="hero">
      <div class="hero-content">
        <div class="logo-wrap">
          <div class="logo-ring"></div>
          <template x-if="restaurant.logo && !logoError">
            <img :src="restaurant.logo" :alt="restaurant.name" class="hero-logo" @error="logoError = true">
          </template>
          <template x-if="!restaurant.logo || logoError">
            <div class="hero-logo-fallback" x-text="restaurant.name ? restaurant.name.charAt(0) : 'M'"></div>
          </template>
        </div>
        <h1 x-text="restaurant.name"></h1>
        <div class="hero-divider"></div>
        <p class="tagline" x-text="restaurant.tagline"></p>

        <!-- Status + Rating -->
        <div class="hero-meta" x-show="restaurant.rating">
          <span class="status-badge" x-show="restaurant.status">
            <span class="status-dot"></span>
            <span x-text="restaurant.status"></span>
          </span>
          <span class="sep">&bull;</span>
          <span class="rating-badge">
            <span>&#9733;</span>
            <span x-text="restaurant.rating"></span>
          </span>
          <span class="sep">&bull;</span>
          <span x-text="restaurant.rating_count" style="font-size:0.7rem"></span>
        </div>

        <div class="hero-actions">
          <a :href="'tel:+' + restaurant.phone" class="hero-btn hero-btn--call tap" aria-label="Call restaurant">
            <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
            Call Us
          </a>
          <a :href="restaurant.google_maps_url" target="_blank" rel="noopener" class="hero-btn hero-btn--map tap" aria-label="Find on Google Maps">
            <svg width="15" height="15" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 010-5 2.5 2.5 0 010 5z"/></svg>
            Find Us
          </a>
        </div>
      </div>
    </section>

    <!-- Sticky Nav -->
    <div class="sticky-nav">
      <div class="nav-inner">
        <div class="search-wrap">
          <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input type="text" x-model="search" @input="onSearch()" class="search-input" placeholder="Search for dishes..." aria-label="Search menu items">
          <button x-show="search.length > 0" @click="search = ''; onSearch()" class="search-clear tap" aria-label="Clear search">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
        <div class="filters" role="group" aria-label="Diet filter">
          <button @click="filter = 'all'" class="filter-btn tap" :class="filter === 'all' && 'active--all'" :aria-pressed="filter === 'all'">All</button>
          <button @click="filter = 'veg'" class="filter-btn tap" :class="filter === 'veg' && 'active--veg'" :aria-pressed="filter === 'veg'">
            <span class="vdot" aria-hidden="true"></span> Veg
          </button>
          <button @click="filter = 'nonveg'" class="filter-btn tap" :class="filter === 'nonveg' && 'active--nonveg'" :aria-pressed="filter === 'nonveg'">
            <span class="nvdot" aria-hidden="true"></span> Non-Veg
          </button>
        </div>
        <nav class="cat-nav no-scrollbar" aria-label="Menu categories">
          <template x-for="(cat, idx) in categories" :key="idx">
            <button @click="scrollToCategory(idx)" class="cat-tab tap" :class="activeCategory === idx && 'active'" :aria-selected="activeCategory === idx">
              <span x-text="cat.name"></span>
              <span class="cat-tab-count" x-text="filteredItems(cat).length"></span>
            </button>
          </template>
        </nav>
      </div>
    </div>

    <!-- Menu -->
    <main class="main" role="main">
      <div x-show="search.length > 0" class="search-info" aria-live="polite">
        <span x-text="totalFilteredItems + ' result' + (totalFilteredItems !== 1 ? 's' : '') + ' for \u201c' + search + '\u201d'"></span>
      </div>

      <template x-for="(cat, catIdx) in categories" :key="catIdx">
        <section :id="'cat-' + catIdx" class="category-section" :aria-label="cat.name">
          <h2 class="category-title" x-show="filteredItems(cat).length > 0">
            <span x-text="cat.name"></span>
            <span class="cat-count" x-text="filteredItems(cat).length + ' items'"></span>
          </h2>
          <template x-for="(item, itemIdx) in filteredItems(cat)" :key="item.name">
            <article class="menu-card reveal" :data-reveal="catIdx + '-' + itemIdx" x-init="$nextTick(() => observeReveal($el))">
              <div class="menu-card-inner">
                <!-- Image -->
                <div class="card-img-wrap">
                  <!-- Bestseller badge -->
                  <div x-show="item.is_bestseller" class="bestseller">&#9733; Bestseller</div>
                  <!-- Shimmer while loading -->
                  <div x-show="item.image && !item._loaded" class="img-skeleton"></div>
                  <template x-if="item.image">
                    <img :src="item.image" :alt="item.name" class="card-img" loading="lazy" @load="item._loaded = true" @error="item.image = ''">
                  </template>
                  <template x-if="!item.image">
                    <div class="card-placeholder">
                      <span class="card-placeholder-icon" x-text="getEmoji(item, cat.name)" aria-hidden="true"></span>
                    </div>
                  </template>
                </div>
                <!-- Body -->
                <div class="card-body">
                  <div class="card-header">
                    <span :class="item.is_veg ? 'vdot' : 'nvdot'" :aria-label="item.is_veg ? 'Vegetarian' : 'Non-vegetarian'"></span>
                    <span class="card-name" x-text="item.name"></span>
                  </div>
                  <p class="card-desc" x-show="item.description" x-text="item.description"></p>
                  <div class="card-footer">
                    <span class="card-price"><span class="rupee">&#8377;</span><span x-text="fmtPrice(item.price)"></span></span>
                    <template x-if="!getCartItem(cat.name, item.name)">
                      <button class="add-btn tap"
                        :class="addingKey === cat.name + '-' + item.name ? (addedKey === cat.name + '-' + item.name ? 'add-btn--added' : 'add-btn--adding') : ''"
                        @click="addWithAnim(cat.name, item)"
                        :aria-label="'Add ' + item.name + ' to cart'"
                        x-text="addedKey === cat.name + '-' + item.name ? '\u2713' : (addingKey === cat.name + '-' + item.name ? '...' : 'ADD')">
                      </button>
                    </template>
                    <template x-if="getCartItem(cat.name, item.name)">
                      <div class="qty-ctrl" :aria-label="'Quantity for ' + item.name">
                        <button class="qty-btn" @click="decrement(cat.name, item.name)" :aria-label="'Decrease ' + item.name">&minus;</button>
                        <span class="qty-val" x-text="getCartItem(cat.name, item.name)?.qty || 0" aria-live="polite"></span>
                        <button class="qty-btn" @click="increment(cat.name, item.name)" :aria-label="'Increase ' + item.name">+</button>
                      </div>
                    </template>
                  </div>
                </div>
              </div>
            </article>
          </template>
        </section>
      </template>

      <!-- Empty -->
      <div x-show="totalFilteredItems === 0" class="empty-state" role="status">
        <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color:var(--text-muted);margin:0 auto 12px;display:block"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <p>No items found</p>
        <p>Try a different search or filter</p>
      </div>

      <a :href="restaurant.google_maps_url" target="_blank" rel="noopener" class="maps-btn tap" aria-label="Open Google Maps">
        <svg width="16" height="16" fill="#ea4335" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 010-5 2.5 2.5 0 010 5z"/></svg>
        Find Us on Google Maps
      </a>
    </main>

    <footer class="site-footer">Powered by <span>DigiMenu</span> &middot; Zed Labs</footer>
  </div>

  <!-- Toast -->
  <div x-show="toast" x-cloak class="toast" :class="toastLeaving ? 'toast-leave' : 'toast-enter'" x-text="'\u2713 ' + toastText"></div>

  <!-- Cart Strip (Swiggy-style bottom bar) -->
  <template x-if="cartCount > 0 && !cartOpen">
    <div class="cart-strip" x-transition>
      <div class="cart-strip-inner tap" @click="openCart()" role="button" aria-label="View cart">
        <div class="cart-strip-left">
          <span class="cart-strip-count" x-text="cartCount"></span>
          <span class="cart-strip-label">
            <span x-text="cartCount === 1 ? '1 item' : cartCount + ' items'"></span>
            <small x-text="'from ' + restaurant.name"></small>
          </span>
        </div>
        <div class="cart-strip-total">
          <span x-text="fmtPriceRupee(cartTotal)"></span>
          <span class="cart-strip-arrow">&#8250;</span>
        </div>
      </div>
    </div>
  </template>

  <!-- Scroll to top -->
  <button x-show="showScrollTop && cartCount === 0" x-cloak @click="window.scrollTo({top:0,behavior:'smooth'})" class="scroll-top tap" aria-label="Scroll to top" x-transition>
    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/></svg>
  </button>

  <!-- Cart Drawer -->
  <div x-show="cartOpen" x-cloak class="cart-overlay" role="dialog" aria-modal="true" aria-label="Your cart" @keydown.escape.window="closeCart()">
    <div class="cart-backdrop" @click="closeCart()" x-show="cartOpen" x-transition.opacity.duration.300ms></div>
    <div class="cart-panel" x-show="cartOpen" x-transition:enter="slide-enter" x-transition:leave="slide-leave" x-trap.noscroll="cartOpen">
      <div class="drawer-handle"></div>
      <div class="cart-header">
        <h2>Your Order <span class="cart-header-sub" x-text="'(' + cartCount + (cartCount === 1 ? ' item' : ' items') + ')'"></span></h2>
        <div class="cart-header-actions">
          <button class="cart-clear tap" @click="confirmClearCart()" aria-label="Clear cart">Clear</button>
          <button class="cart-close" @click="closeCart()" aria-label="Close cart">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
      </div>
      <div class="cart-body">
        <template x-if="cart.length === 0">
          <div class="empty-state" style="padding:32px 0"><p>Your cart is empty</p><p>Add items from the menu</p></div>
        </template>
        <template x-for="(item, idx) in cart" :key="item.category + '-' + item.name">
          <div class="cart-item">
            <!-- Thumbnail -->
            <template x-if="item.image"><img :src="item.image" :alt="item.name" class="cart-item-thumb" loading="lazy"></template>
            <template x-if="!item.image"><div class="cart-item-thumb-placeholder" x-text="getEmoji(item, item.category)" aria-hidden="true"></div></template>
            <div class="cart-item-info">
              <div class="cart-item-name">
                <span :class="item.is_veg ? 'vdot vdot--sm' : 'nvdot nvdot--sm'" aria-hidden="true"></span>
                <span x-text="item.name"></span>
              </div>
              <div class="cart-item-each" x-text="fmtPriceRupee(item.price) + ' each'"></div>
            </div>
            <div class="cart-qty" :aria-label="'Quantity for ' + item.name">
              <button @click="decrement(item.category, item.name)">&minus;</button>
              <span x-text="item.qty" aria-live="polite"></span>
              <button @click="increment(item.category, item.name)">+</button>
            </div>
            <div class="cart-item-total" x-text="fmtPriceRupee(item.price * item.qty)"></div>
          </div>
        </template>

        <div x-show="cart.length > 0" class="cart-total-section">
          <div class="cart-total-row">
            <span class="cart-total-label">Total</span>
            <span class="cart-total-amount" x-text="fmtPriceRupee(cartTotal)" aria-live="polite"></span>
          </div>
        </div>

        <!-- Order Type -->
        <div x-show="cart.length > 0" class="order-section">
          <h3>How would you like your order?</h3>
          <div class="order-types" role="group" aria-label="Order type">
            <button @click="orderType = 'dinein'" class="order-type-btn tap" :class="orderType === 'dinein' && 'active'" :aria-pressed="orderType === 'dinein'">
              <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
              Dine-In
            </button>
            <button @click="orderType = 'delivery'" class="order-type-btn tap" :class="orderType === 'delivery' && 'active'" :aria-pressed="orderType === 'delivery'">
              <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
              Delivery
            </button>
          </div>
          <div x-show="orderType === 'dinein'" x-transition>
            <div class="form-group">
              <label for="tbl" class="form-label">Table Number <span class="req">*</span></label>
              <input id="tbl" type="text" x-model="dinein.tableNumber" placeholder="e.g. 5" class="form-input">
            </div>
          </div>
          <div x-show="orderType === 'delivery'" x-transition>
            <div class="form-group">
              <label for="dname" class="form-label">Full Name <span class="req">*</span></label>
              <input id="dname" type="text" x-model="delivery.name" placeholder="Your name" class="form-input">
            </div>
            <div class="form-group">
              <label for="dmob" class="form-label">Mobile Number <span class="req">*</span></label>
              <input id="dmob" type="tel" x-model="delivery.mobile" placeholder="+91 93803 41684" class="form-input">
            </div>
            <div class="form-group">
              <label for="daddr" class="form-label">Delivery Address <span class="req">*</span></label>
              <textarea id="daddr" x-model="delivery.address" placeholder="Full delivery address" rows="2" class="form-input"></textarea>
            </div>
          </div>
          <div x-show="checkoutError" x-transition class="form-error" role="alert">
            <svg width="13" height="13" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
            <span x-text="checkoutError"></span>
          </div>
        </div>
      </div>
      <div x-show="cart.length > 0" class="cart-footer">
        <button @click="orderViaWhatsApp()" class="wa-btn tap" aria-label="Send order via WhatsApp">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Place Order &middot; <span x-text="fmtPriceRupee(cartTotal)"></span>
        </button>
        <button @click="closeCart()" class="add-more-btn tap">+ Add More Items</button>
      </div>
    </div>
  </div>

  <!-- Noscript -->
  <noscript>
    <style>body > *:not(noscript):not(.hero){display:none}header{position:static}</style>
    <div style="max-width:32rem;margin:2rem auto;padding:1rem;text-align:center;color:#e8e6e3;font-family:system-ui">
      <p style="padding:1rem;background:#222;border-radius:8px">Please enable JavaScript to use the menu.</p>
    </div>
  </noscript>

  <script>
    function menuApp() {
      return {
        restaurant: {}, categories: [], loading: true, logoError: false,
        filter: 'all', search: '', activeCategory: 0, showScrollTop: false,
        cart: [], cartOpen: false,
        orderType: '', checkoutError: '',
        dinein: { tableNumber: '' },
        delivery: { name: '', mobile: '', address: '' },
        addingKey: '', addedKey: '',
        toast: false, toastText: '', toastLeaving: false, toastTimer: null,
        _observer: null,

        async init() {
          try {
            const res = await fetch('menu.json');
            const data = await res.json();
            this.restaurant = data.restaurant;
            // Add _loaded flag to each item for image skeleton
            this.categories = data.categories.map(cat => ({
              ...cat,
              items: cat.items.map(item => ({ ...item, _loaded: !item.image }))
            }));
            document.title = data.restaurant.name + ' \u2014 Digital Menu';
            await new Promise(r => setTimeout(r, 500));
          } catch (e) { console.error('Failed to load menu:', e); }
          this.loading = false;

          // Scroll tracking
          let ticking = false;
          window.addEventListener('scroll', () => {
            if (!ticking) {
              requestAnimationFrame(() => {
                this.updateActiveCategory();
                this.showScrollTop = window.scrollY > 400;
                ticking = false;
              });
              ticking = true;
            }
          });

          // IntersectionObserver for scroll reveal
          this._observer = new IntersectionObserver((entries) => {
            entries.forEach(e => {
              if (e.isIntersecting) { e.target.classList.add('visible'); this._observer.unobserve(e.target); }
            });
          }, { threshold: 0.05, rootMargin: '0px 0px -20px 0px' });
          // Enable reveal animations after observer is ready
          this.$nextTick(() => {
            const main = document.querySelector('.main');
            if (main) main.classList.add('reveal-ready');
            // Fallback: observe all reveal elements after render
            setTimeout(() => {
              document.querySelectorAll('.reveal:not(.visible)').forEach(el => this._observer.observe(el));
            }, 100);
          });
        },

        observeReveal(el) { if (this._observer) this._observer.observe(el); },

        // Formatting
        fmtPrice(n) { return n.toLocaleString('en-IN'); },
        fmtPriceRupee(n) { return '\u20B9' + n.toLocaleString('en-IN'); },

        getEmoji(item, catName) {
          const c = catName.toLowerCase();
          if (c.includes('starter')) return item.is_veg ? '\uD83E\uDD5E' : '\uD83C\uDF57';
          if (c.includes('non')) return '\uD83C\uDF56';
          if (c.includes('veg')) return '\uD83E\uDD58';
          if (c.includes('rice') || c.includes('bread')) return '\uD83C\uDF5A';
          if (c.includes('beverage') || c.includes('dessert')) return '\uD83C\uDF79';
          return item.is_veg ? '\uD83C\uDF3F' : '\uD83C\uDF56';
        },

        // Search
        onSearch() { if (this.search.length > 0) this.filter = 'all'; },

        // Filtering
        filteredItems(cat) {
          let items = cat.items;
          if (this.filter === 'veg') items = items.filter(i => i.is_veg);
          else if (this.filter === 'nonveg') items = items.filter(i => !i.is_veg);
          if (this.search.length > 0) {
            const q = this.search.toLowerCase();
            items = items.filter(i => i.name.toLowerCase().includes(q) || (i.description && i.description.toLowerCase().includes(q)));
          }
          return items;
        },

        get totalFilteredItems() {
          return this.categories.reduce((s, c) => s + this.filteredItems(c).length, 0);
        },

        updateActiveCategory() {
          for (let i = this.categories.length - 1; i >= 0; i--) {
            const el = document.getElementById('cat-' + i);
            if (el && el.getBoundingClientRect().top <= 200) { this.activeCategory = i; break; }
          }
        },

        scrollToCategory(idx) {
          this.activeCategory = idx;
          const el = document.getElementById('cat-' + idx);
          if (el) {
            window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 180, behavior: 'smooth' });
          }
          // Auto-scroll tab into view
          const tab = document.querySelector(`.cat-tab:nth-child(${idx + 1})`);
          if (tab) tab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        },

        // Cart
        getCartItem(cat, name) { return this.cart.find(i => i.category === cat && i.name === name); },

        addWithAnim(cat, item) {
          const key = cat + '-' + item.name;
          this.addingKey = key;
          setTimeout(() => {
            this.addedKey = key;
            this.addToCart(cat, item);
            this.showToast(item.name + ' added');
            setTimeout(() => { this.addingKey = ''; this.addedKey = ''; }, 500);
          }, 250);
        },

        addToCart(cat, item) {
          const existing = this.getCartItem(cat, item.name);
          if (existing) { existing.qty++; }
          else {
            this.cart.push({
              category: cat, name: item.name, price: item.price,
              is_veg: item.is_veg, image: item.image || '', qty: 1
            });
          }
        },

        increment(cat, name) {
          const item = this.getCartItem(cat, name);
          if (item && item.qty < 99) item.qty++;
        },

        decrement(cat, name) {
          const item = this.getCartItem(cat, name);
          if (item) { item.qty--; if (item.qty <= 0) this.cart = this.cart.filter(i => !(i.category === cat && i.name === name)); }
        },

        get cartCount() { return this.cart.reduce((s, i) => s + i.qty, 0); },
        get cartTotal() { return this.cart.reduce((s, i) => s + i.price * i.qty, 0); },

        openCart() { this.cartOpen = true; document.body.style.overflow = 'hidden'; },
        closeCart() { this.cartOpen = false; document.body.style.overflow = ''; },

        confirmClearCart() {
          if (confirm('Clear all items from your cart?')) {
            this.cart = []; this.orderType = ''; this.checkoutError = '';
          }
        },

        // Toast
        showToast(text) {
          clearTimeout(this.toastTimer);
          this.toast = false; this.toastLeaving = false;
          requestAnimationFrame(() => {
            this.toastText = text; this.toast = true;
            this.toastTimer = setTimeout(() => {
              this.toastLeaving = true;
              setTimeout(() => { this.toast = false; this.toastLeaving = false; }, 300);
            }, 1800);
          });
        },

        // Checkout
        orderViaWhatsApp() {
          this.checkoutError = '';
          if (!this.orderType) { this.checkoutError = 'Please select Dine-In or Delivery'; return; }
          if (this.orderType === 'dinein' && !this.dinein.tableNumber.trim()) { this.checkoutError = 'Please enter your table number'; return; }
          if (this.orderType === 'delivery') {
            if (!this.delivery.name.trim()) { this.checkoutError = 'Please enter your name'; return; }
            if (!this.delivery.mobile.trim()) { this.checkoutError = 'Please enter your mobile'; return; }
            if (!this.delivery.address.trim()) { this.checkoutError = 'Please enter your address'; return; }
          }

          let msg = `*${this.restaurant.name}*\n\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n`;
          if (this.orderType === 'dinein') {
            msg += `\uD83C\uDF7D\uFE0F *Dine-In* | Table ${this.dinein.tableNumber}\n`;
          } else {
            msg += `\uD83D\uDE97 *Home Delivery*\n\uD83D\uDC64 ${this.delivery.name}\n\uD83D\uDCF1 ${this.delivery.mobile}\n\uD83D\uDCCD ${this.delivery.address}\n`;
          }
          msg += `\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n\n`;
          this.cart.forEach(item => {
            const dot = item.is_veg ? '\uD83D\uDFE2' : '\uD83D\uDD34';
            msg += `${dot} *${item.name}*\n    ${item.qty} \u00D7 ${this.fmtPriceRupee(item.price)} = *${this.fmtPriceRupee(item.qty * item.price)}*\n\n`;
          });
          msg += `\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\n\uD83D\uDCB0 *Grand Total: ${this.fmtPriceRupee(this.cartTotal)}*\n`;
          window.open(`https://wa.me/${this.restaurant.phone}?text=${encodeURIComponent(msg)}`, '_blank');
        }
      };
    }
  </script>
</body>
</html>
